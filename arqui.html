<!-- Librerías JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>

<script type="module">
import { createClient } from "https://esm.sh/@supabase/supabase-js@2";

const SUPABASE_URL = "https://phikuwjapkwmflnhekrg.supabase.co";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBoaWt1d2phcGt3bWZsbmhla3JnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NTgxNzQ1MzIsImV4cCI6MjA3Mzc1MDUzMn0.a1bGSecYAQG4q_IOdndOo6r76CgeEGLnoODFLemQwZc";

const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
const calendario = document.getElementById("calendarioSemanas");
const visualizacion = document.getElementById("visualizacion");

// Crear 16 tarjetas tipo calendario
for (let i = 1; i <= 16; i++) {
  calendario.innerHTML += `
    <div class="col-md-3" data-aos="fade-up">
      <div class="card card-semana" data-semana="${i}">
        <div class="card-body">
          <h5>📚 Semana ${i}</h5>
          <p class="text-muted small">Clic para desplegar</p>
        </div>
        <div class="collapse p-3" id="semana${i}Content">
          <div id="contenidoSemana${i}">Cargando archivos...</div>
        </div>
      </div>
    </div>`;
}

// Inicializar AOS
AOS.init();

// Función para cargar archivos de cada semana
async function cargarArchivos(semana) {
  const carpeta = `Semana_${semana}`;
  const { data, error } = await supabase.storage.from("chicarap").list(carpeta, { limit: 50 });
  const contenido = document.getElementById(`contenidoSemana${semana}`);
  if (!data || data.length === 0 || error) {
    contenido.innerHTML = `📭 Sin archivos`;
    return;
  }

  let html = "";
  data.forEach(archivo => {
    const url = `${SUPABASE_URL}/storage/v1/object/public/chicarap/${carpeta}/${archivo.name}`;
    html += `
      <div class="mb-2">
        <strong>${archivo.name}</strong><br>
        <button class="btn btn-sm btn-outline-primary me-1" onclick="verArchivo('${url}')">👁️ Ver</button>
        <a href="${url}" download class="btn btn-sm btn-outline-success">⬇️ Descargar</a>
      </div>`;
  });
  contenido.innerHTML = html;
}

// Función de vista previa en div separado
// Función de vista previa flotante
window.verArchivo = function(url) {
  const previewContent = document.getElementById("previewContent");
  previewContent.innerHTML = ""; // limpiar modal

  // Imagen
  if (url.match(/\.(jpg|jpeg|png|gif)$/i)) {
    previewContent.innerHTML = `<img src="${url}" class="img-fluid rounded shadow">`;

  // PDF
  } else if (url.match(/\.pdf$/i)) {
    previewContent.innerHTML = `<embed src="${url}" type="application/pdf" width="100%" height="600px" />`;

  // PPT / PPTX (iframe Office Online)
  } else if (url.match(/\.(ppt|pptx)$/i)) {
    previewContent.innerHTML = `
      <iframe src="https://view.officeapps.live.com/op/embed.aspx?src=${encodeURIComponent(url)}"
              width="100%" height="600px" frameborder="0"></iframe>
    `;

  // Otros archivos
  } else {
    previewContent.innerHTML = `<p>📄 <a href="${url}" target="_blank">Abrir archivo</a></p>`;
  }

  // Mostrar modal
  const modal = new bootstrap.Modal(document.getElementById("previewModal"));
  modal.show();

  // Notificación
  Toastify({
    text: "Archivo cargado en vista previa",
    duration: 2000,
    gravity: "top",
    position: "right",
    backgroundColor: "#b56576"
  }).showToast();
};


// Detectar clic en tarjeta para desplegar acordeón y cargar archivos
document.querySelectorAll(".card-semana").forEach(card => {
  const semana = card.dataset.semana;
  const collapse = card.querySelector(`#semana${semana}Content`);
  card.addEventListener("click", () => {
    const bsCollapse = new bootstrap.Collapse(collapse, { toggle: true });
    cargarArchivos(semana);
  });
});
</script>
<!-- Modal de Visualización Flotante -->

        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body text-center" id="previewContent">
        <!-- Aquí se cargará el archivo -->
      </div>
    </div>
  </div>
</div>
