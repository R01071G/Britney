<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Panel Admin - Subir y Gestionar Archivos</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/upload.css">
  <link rel="icon" type="image/png" href="img/icon2.png">
</head>
<body>

<div class="container py-4">
  <!-- 🔙 Botón volver -->
  <div class="top-bar">
    <a href="index.html" class="back-btn">← Volver</a>
  </div>

  <div class="row g-4">
    
    <!-- Subir archivos -->
    <div class="col-md-5">
      <div class="card-custom">
        <h3 class="mb-3"> Subir Trabajo Semanal</h3>
        <form id="formUpload">
          <div class="mb-3">
            <label for="semana" class="form-label">Seleccionar semana</label>
            <select id="semana" class="form-select" required>
              <option value="Semana 1">Semana 1</option>
              <option value="Semana 2">Semana 2</option>
              <option value="Semana 3">Semana 3</option>
              <option value="Semana 4">Semana 4</option>
              <option value="Semana 5">Semana 5</option>
              <option value="Semana 6">Semana 6</option>
              <option value="Semana 7">Semana 7</option>
              <option value="Semana 8">Semana 8</option>
              <option value="Semana 9">Semana 9</option>
              <option value="Semana 10">Semana 10</option>
              <option value="Semana 11">Semana 11</option>
              <option value="Semana 12">Semana 12</option>
              <option value="Semana 13">Semana 13</option>
              <option value="Semana 14">Semana 14</option>
              <option value="Semana 15">Semana 15</option>
              <option value="Semana 16">Semana 16</option>
            </select>
          </div>

          <div class="mb-3">
            <label for="archivo" class="form-label">Subir archivo</label>
            <input type="file" id="archivo" class="form-control" required>
          </div>

          <button type="submit" class="btn btn-custom w-100">Subir</button>
        </form>
        <p id="estado" class="mt-3"></p>
      </div>
    </div>

    <!-- Lista de archivos -->
    <div class="col-md-7">
      <div class="card-custom">
        <h3 class="mb-3">Listado de Archivos por semana</h3>
      <div class="mb-3">
        <label for="filtroSemana" class="form-label">Filtrar por semana</label>
        <select id="filtroSemana" class="form-select">
          <option value="Semana 1">Semana 1</option>
          <option value="Semana 2">Semana 2</option>
          <option value="Semana 3">Semana 3</option>
          <option value="Semana 4">Semana 4</option>
          <option value="Semana 5">Semana 5</option>
          <option value="Semana 6">Semana 6</option>
          <option value="Semana 7">Semana 7</option>
          <option value="Semana 8">Semana 8</option>
          <option value="Semana 9">Semana 9</option>
          <option value="Semana 10">Semana 10</option>
          <option value="Semana 11">Semana 11</option>
          <option value="Semana 12">Semana 12</option>
          <option value="Semana 13">Semana 13</option>
          <option value="Semana 14">Semana 14</option>
          <option value="Semana 15">Semana 15</option>
          <option value="Semana 16">Semana 16</option>
        </select>
      </div>
      <table class="table table-dark table-sm table-hover align-middle">
        <thead>
          <tr>
            <th>Archivo</th>
            <th>Fecha</th>
            <th>Acción</th>
          </tr>
        </thead>
        <tbody id="listaArchivos">
          <!-- Aquí se listan los archivos -->
        </tbody>
      </table>
      </div>
    </div>

  </div>
</div>

<!-- 🔳 Modal de Visualización -->
<div class="modal fade" id="previewModal" tabindex="-1">
  <div class="modal-dialog modal-xl modal-dialog-centered">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title">Visualización de Archivo</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body text-center" id="previewContent">
        <!-- Aquí se carga el archivo -->
      </div>
    </div>
  </div>
</div>

<!-- ⚡ JS de Supabase + Bootstrap -->
<script type="module">
  import { createClient } from "https://esm.sh/@supabase/supabase-js@2";

  const SUPABASE_URL = "https://phikuwjapkwmflnhekrg.supabase.co";
  const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBoaWt1d2phcGt3bWZsbmhla3JnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NTgxNzQ1MzIsImV4cCI6MjA3Mzc1MDUzMn0.a1bGSecYAQG4q_IOdndOo6r76CgeEGLnoODFLemQwZc";

  const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  const form = document.getElementById("formUpload");
  const estado = document.getElementById("estado");
  const listaArchivos = document.getElementById("listaArchivos");
  const filtroSemana = document.getElementById("filtroSemana");
  const previewContent = document.getElementById("previewContent");

  function normalizar(nombre) {
    return nombre
      .normalize("NFD")
      .replace(/[\u0300-\u036f]/g, "")
      .replace(/\s+/g, "_")
      .replace(/[^a-zA-Z0-9_.-]/g, "");
  }

  // 🔼 Subir archivo
  form.addEventListener("submit", async (e) => {
    e.preventDefault();
    const archivo = document.getElementById("archivo").files[0];
    const semana = document.getElementById("semana").value;

    if (!archivo) {
      estado.textContent = "⚠️ Selecciona un archivo.";
      estado.style.color = "yellow";
      return;
    }

    estado.textContent = "⏳ Subiendo...";
    estado.style.color = "orange";

    const filePath = `${normalizar(semana)}/${Date.now()}_${normalizar(archivo.name)}`;
    const { error } = await supabase.storage.from("chicarap").upload(filePath, archivo);

    if (error) {
      estado.textContent = "❌ Error al subir: " + error.message;
      estado.style.color = "red";
      return;
    }

    estado.textContent = "✅ Archivo subido.";
    estado.style.color = "lime";
    form.reset();

    cargarArchivos(filtroSemana.value);
  });

  // 📂 Cargar archivos
  async function cargarArchivos(semana) {
    const { data, error } = await supabase.storage.from("chicarap").list(normalizar(semana), { limit: 100 });
    listaArchivos.innerHTML = "";

    if (error) {
      listaArchivos.innerHTML = "<tr><td colspan='3'>❌ Error al listar</td></tr>";
      return;
    }
    if (data.length === 0) {
      listaArchivos.innerHTML = "<tr><td colspan='3'>📭 Sin archivos</td></tr>";
      return;
    }

    data.forEach(async (file) => {
      const { data: urlData } = await supabase.storage.from("chicarap").getPublicUrl(`${normalizar(semana)}/${file.name}`);
      const url = urlData.publicUrl;
      const fecha = new Date(file.created_at || Date.now()).toLocaleString();

      const row = document.createElement("tr");
      row.innerHTML = `
        <td>${file.name}</td>
        <td>${fecha}</td>
        <td>
          <button class="btn btn-primary btn-sm" onclick="visualizarArchivo('${url}')">Visualizar</button>
          <button class="btn btn-danger btn-sm" onclick="eliminarArchivo('${normalizar(semana)}/${file.name}')">Borrar</button>
        </td>
      `;
      listaArchivos.appendChild(row);
    });
  }

  // 🎯 Filtrar semana
  filtroSemana.addEventListener("change", () => {
    cargarArchivos(filtroSemana.value);
  });

  // 🗑️ Eliminar archivo
  window.eliminarArchivo = async (path) => {
    const { error } = await supabase.storage.from("chicarap").remove([path]);
    if (error) {
      alert("❌ Error al eliminar: " + error.message);
    } else {
      alert("✅ Archivo eliminado.");
      cargarArchivos(filtroSemana.value);
    }
  };


  // 👀 Visualizar archivo
window.visualizarArchivo = (url) => {
  previewContent.innerHTML = ""; // limpiar modal

  if (url.match(/\.(jpg|jpeg|png|gif)$/i)) {
    // 🖼️ Imágenes
    previewContent.innerHTML = `<img src="${url}" class="img-fluid rounded shadow">`;
  } else if (url.match(/\.pdf$/i)) {
    // 📄 PDF
    previewContent.innerHTML = `<embed src="${url}" type="application/pdf" width="100%" height="600px" />`;
  } else if (url.match(/\.(ppt|pptx|doc|docx|xls|xlsx)$/i)) {
    // 📊📑 Archivos Office (Word, Excel, PowerPoint)
    previewContent.innerHTML = `
      <iframe src="https://view.officeapps.live.com/op/embed.aspx?src=${encodeURIComponent(url)}"
              width="100%" height="600px" frameborder="0"></iframe>`;
  } else {
    // 🔗 Otros
    previewContent.innerHTML = `<p>📄 <a href="${url}" target="_blank">Abrir archivo</a></p>`;
  }

  const modal = new bootstrap.Modal(document.getElementById("previewModal"));
  modal.show();
};

  // 🚀 Inicial
  cargarArchivos(filtroSemana.value);
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
